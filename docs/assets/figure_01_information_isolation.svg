<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font-family: "PingFang SC", "Heiti SC", "Microsoft YaHei", Arial, sans-serif; font-size: 46px; font-weight: 700; fill: #172033; }
      .subtitle { font-family: "PingFang SC", "Heiti SC", "Microsoft YaHei", Arial, sans-serif; font-size: 24px; fill: #5b6475; }
      .panel-title { font-family: "PingFang SC", "Heiti SC", "Microsoft YaHei", Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #172033; }
      .panel-kicker { font-family: "PingFang SC", "Heiti SC", "Microsoft YaHei", Arial, sans-serif; font-size: 19px; font-weight: 600; fill: #61708a; }
      .body { font-family: "PingFang SC", "Heiti SC", "Microsoft YaHei", Arial, sans-serif; font-size: 22px; fill: #273244; }
      .small { font-family: "PingFang SC", "Heiti SC", "Microsoft YaHei", Arial, sans-serif; font-size: 18px; fill: #5b6475; }
      .code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 19px; fill: #233047; }
      .code-small { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 17px; fill: #4b5567; }
      .visible { fill: #e9f4ff; stroke: #2f7fd8; stroke-width: 3; }
      .hidden { fill: #fff2ed; stroke: #de5d3f; stroke-width: 3; }
      .neutral { fill: #ffffff; stroke: #d7dce7; stroke-width: 2; }
      .runner { fill: #edf7f1; stroke: #3e9561; stroke-width: 3; }
      .shadow { filter: drop-shadow(0 10px 22px rgba(23, 32, 51, 0.10)); }
      .arrow { stroke: #3e9561; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .thin-arrow { stroke: #8a94a6; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead-gray); }
      .wall { stroke: #2b3345; stroke-width: 7; stroke-dasharray: 18 14; stroke-linecap: round; }
      .badge-blue { fill: #2f7fd8; }
      .badge-red { fill: #de5d3f; }
      .badge-green { fill: #3e9561; }
      .white { fill: #ffffff; }
      .muted-line { stroke: #d7dce7; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#3e9561"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8a94a6"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="950"/>

  <text class="title" x="80" y="82">信息隔离：AI 只玩“前台剧情”，runner 才看“后台规则”</text>
  <text class="subtitle" x="82" y="124">同一个决策节点被拆成两层，叙事体验和实验控制彼此隔离。</text>

  <rect class="visible shadow" x="80" y="175" rx="24" ry="24" width="610" height="535"/>
  <circle class="badge-blue" cx="126" cy="225" r="23"/>
  <text class="white panel-kicker" x="116" y="232">1</text>
  <text class="panel-title" x="165" y="235">AI 可见层：player_facing</text>
  <text class="small" x="166" y="266">只包含场景、气氛、选项文字和历史对话</text>

  <rect class="neutral" x="122" y="305" rx="16" ry="16" width="525" height="250"/>
  <text class="code" x="150" y="346">{</text>
  <text class="code" x="176" y="382">"context": "丹尼尔抱着艾玛站在天台边缘，</text>
  <text class="code" x="176" y="414">直升机的风压让他的声音发抖。",</text>
  <text class="code" x="176" y="456">"choices": [</text>
  <text class="code" x="204" y="492">"尝试安抚丹尼尔",</text>
  <text class="code" x="204" y="526">"走向受伤警察"</text>
  <text class="code" x="176" y="560">]</text>
  <text class="code" x="150" y="594">}</text>

  <rect x="122" y="590" rx="16" ry="16" width="525" height="78" fill="#d8ecff" stroke="#94c7f6" stroke-width="2"/>
  <text class="body" x="150" y="626">AI 的体验：</text>
  <text class="body" x="264" y="626">像第一次玩游戏，只能根据眼前信息判断。</text>

  <line class="wall" x1="800" y1="175" x2="800" y2="710"/>
  <rect x="733" y="386" rx="18" ry="18" width="134" height="126" fill="#ffffff" stroke="#2b3345" stroke-width="3"/>
  <text class="panel-kicker" x="760" y="428" fill="#2b3345">隔离墙</text>
  <text class="small" x="748" y="466">system 不进入</text>
  <text class="small" x="758" y="494">模型消息</text>

  <rect class="hidden shadow" x="910" y="175" rx="24" ry="24" width="610" height="535"/>
  <circle class="badge-red" cx="956" cy="225" r="23"/>
  <text class="white panel-kicker" x="946" y="232">2</text>
  <text class="panel-title" x="995" y="235">AI 不可见层：system</text>
  <text class="small" x="996" y="266">只供 runner 读取，用来推进状态和判定结局</text>

  <rect class="neutral" x="952" y="305" rx="16" ry="16" width="525" height="250"/>
  <text class="code" x="980" y="346">{</text>
  <text class="code" x="1006" y="382">"effects": {</text>
  <text class="code" x="1034" y="418">"reassure": { "success_probability": 15 },</text>
  <text class="code" x="1034" y="454">"save_cop": { "trust": -5, "cop_saved": true }</text>
  <text class="code" x="1006" y="490">},</text>
  <text class="code" x="1006" y="526">"ending_resolution": "state check"</text>
  <text class="code" x="980" y="562">}</text>

  <rect x="952" y="590" rx="16" ry="16" width="525" height="78" fill="#ffe0d7" stroke="#f0a08d" stroke-width="2"/>
  <text class="body" x="980" y="626">AI 不知道：</text>
  <text class="body" x="1108" y="626">“信任值 +15”、隐藏线索、结局条件。</text>

  <rect class="runner shadow" x="150" y="765" rx="22" ry="22" width="1300" height="112"/>
  <circle class="badge-green" cx="196" cy="821" r="22"/>
  <text class="white panel-kicker" x="186" y="828">3</text>
  <text class="panel-title" x="236" y="812">runner 执行链路</text>
  <text class="small" x="238" y="846">解析可见文本 → 发送给 AI → 记录选择 → 应用 system.effects → 进入下一个节点或结局</text>

  <path class="thin-arrow" d="M 520 710 C 560 750, 620 775, 704 800"/>
  <path class="thin-arrow" d="M 1080 710 C 1032 750, 980 775, 895 800"/>
  <path class="arrow" d="M 705 821 L 842 821"/>
  <path class="arrow" d="M 960 821 L 1097 821"/>
  <rect x="678" y="793" rx="12" ry="12" width="116" height="56" fill="#ffffff" stroke="#b9e0c7" stroke-width="2"/>
  <text class="small" x="704" y="827">AI 选择</text>
  <rect x="842" y="793" rx="12" ry="12" width="118" height="56" fill="#ffffff" stroke="#b9e0c7" stroke-width="2"/>
  <text class="small" x="862" y="827">更新状态</text>
  <rect x="1097" y="793" rx="12" ry="12" width="120" height="56" fill="#ffffff" stroke="#b9e0c7" stroke-width="2"/>
  <text class="small" x="1118" y="827">推进剧情</text>
</svg>
